name: Build C526A iPhone Tether Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/openwrt
          ref: openwrt-18.06
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk getopt git wget libssl-dev xsltproc

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          make defconfig
          echo "CONFIG_TARGET_ipq40xx=y" >> .config
          echo "CONFIG_TARGET_ipq40xx_generic=y" >> .config
          echo "CONFIG_TARGET_ipq40xx_generic_DEVICE_hiwifi_c526a=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-ipheth=y" >> .config
          echo "CONFIG_PACKAGE_usbmuxd=y" >> .config
          echo "CONFIG_PACKAGE_libusbmuxd=y" >> .config
          echo "CONFIG_PACKAGE_usbutils=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          make defconfig

      - name: Build firmware
        run: make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: C526A-Firmware
          path: bin/targets/ipq40xx/generic/
