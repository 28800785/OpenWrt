# HiWiFi C526A 定制编译脚本 (修正：openwrt-18.06.9)
name: Build C526A iPhone Tether Firmware

on:
  workflow_dispatch: # 必须保留手动触发，禁止push自动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          # 🌟 修正：这里是 18.06.9 (点0)，不是 18.86.9
          ref: openwrt-18.06.9
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext git wget libssl-dev xsltproc

      - name: Update Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Custom Config
        run: |
          rm -f .config
          # 基础架构
          echo "CONFIG_TARGET_ipq40xx=y" >> .config
          echo "CONFIG_TARGET_ipq40xx_generic=y" >> .config
          # 核心设备：极路由X C526A (注意下划线)
          echo "CONFIG_TARGET_ipq40xx_generic_DEVICE_hiwifi_c526a=y" >> .config
          # 固件格式
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS4_XZ=y" >> .config
          # 预集成 iPhone USB 共享驱动
          echo "CONFIG_PACKAGE_kmod-usb-net-ipheth=y" >> .config
          echo "CONFIG_PACKAGE_usbmuxd=y" >> .config
          echo "CONFIG_PACKAGE_libusbmuxd=y" >> .config
          echo "CONFIG_PACKAGE_usbutils=y" >> .config
          # 安装 LuCI 后台
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          
          make defconfig

      - name: Build Firmware
        run: |
          make -j$(nproc)

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-C526A-iPhone-Tether-Final
          path: bin/targets/ipq40xx/generic/
